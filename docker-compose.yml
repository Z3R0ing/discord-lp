version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: loyalty-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: loyaltybot
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loyalty -d loyaltybot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: loyalty-app
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}

      DB_URL: jdbc:postgresql://postgres:5432/loyaltybot

      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/loyaltybot
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      JAVA_OPTS: -Xms256m -Xmx512m

volumes:
  postgres_data: