services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-loyalty-bot
    restart: unless-stopped
    ports:
      - "8080"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}